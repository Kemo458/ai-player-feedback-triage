name: epam-player-feedback

# AI-Powered Player Feedback Triage System
# Base stack (portable). deploy/docker-compose.ovh.yml adds the Cloudflare tunnel + external net.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pf_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-playerfeedback}
    volumes:
      - pf-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pf} -d ${POSTGRES_DB:-playerfeedback}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pf-backend

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_CONTEXT_LENGTH: "8192"
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL:-1}"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_MAX_QUEUE: "32"
      OLLAMA_KEEP_ALIVE: "15m"
    volumes:
      - pf-ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    mem_limit: ${OLLAMA_MEM_LIMIT:-8g}
    cpus: ${OLLAMA_CPUS:-4.0}
    networks:
      - pf-backend

  google-play-scraper:
    build:
      context: ./scraper
    restart: unless-stopped
    environment:
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-change-me-internal-key}
      MAX_REVIEWS_PER_IMPORT: ${GOOGLEPLAY_MAX_REVIEWS:-500}
      PAGE_DELAY_MS: ${GOOGLEPLAY_PAGE_DELAY_MS:-500}
      PAGE_TIMEOUT_SECONDS: ${GOOGLEPLAY_PAGE_TIMEOUT:-30}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8080/health'); sys.exit(0)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - pf-backend

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-playerfeedback};Username=${POSTGRES_USER:-pf};Password=${POSTGRES_PASSWORD:-pf_local_dev}"
      Auth__ManagerUsername: ${PF_MANAGER_USERNAME:-manager}
      Auth__ManagerPassword: ${PF_MANAGER_PASSWORD:-manager-dev-pass}
      Auth__JwtSigningKey: ${PF_JWT_SIGNING_KEY:-dev-signing-key-please-override-with-32B+}
      Auth__JwtIssuer: player-feedback
      Frontend__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:8090}
      GooglePlay__ScraperBaseUrl: http://google-play-scraper:8080
      GooglePlay__InternalServiceKey: ${INTERNAL_SERVICE_KEY:-change-me-internal-key}
      GooglePlay__MaxReviewsPerImport: ${GOOGLEPLAY_MAX_REVIEWS:-500}
      Llm__Provider: ${LLM_PROVIDER:-Ollama}
      Llm__BaseUrl: http://ollama:11434
      Llm__Model: ${LLM_MODEL:-qwen2.5:3b}
      Llm__ReviewContextTokens: "4096"
      Llm__SummaryContextTokens: "8192"
      Llm__TimeoutSeconds: ${LLM_TIMEOUT_SECONDS:-90}
      Llm__PromptVersion: feedback-analysis-v1
      Workers__AnalysisConcurrency: ${ANALYSIS_CONCURRENCY:-1}
      Workers__ImportConcurrency: "1"
      Workers__LeaseSeconds: "120"
      Workers__PollIntervalMilliseconds: "1000"
      Feedback__ManualReviewConfidenceThreshold: "0.65"
      SignalR__Enabled: "true"
      DemoSeed__Enabled: ${DEMO_SEED:-true}
    networks:
      - pf-backend

  web:
    build:
      context: ./frontend
    restart: unless-stopped
    networks:
      - pf-backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    # Loopback-only: browsers reach it locally; on the server the Cloudflare tunnel
    # reaches it over the internal docker network (service name `caddy`), never a public port.
    ports:
      - "127.0.0.1:${PUBLISH_PORT:-8090}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - pf-caddy-data:/data
      - pf-caddy-config:/config
    networks:
      - pf-backend

volumes:
  pf-postgres:
  pf-ollama:
  pf-caddy-data:
  pf-caddy-config:

networks:
  pf-backend:
    driver: bridge
