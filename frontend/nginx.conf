server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — nginx only serves static files; the outer Caddy routes /api & /hubs.
    location / {
        try_files $uri /index.html;
    }
}
